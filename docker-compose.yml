version: "3.9"

# ─── Watch Warden ─────────────────────────────────────────────────────────────
# Production / self-hosted Docker Compose.
# Copy .env.example to .env and fill in your values before running.
# Start: docker compose up -d
# ─────────────────────────────────────────────────────────────────────────────

services:
  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: watchwarden-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: watchwarden
      POSTGRES_USER: watchwarden
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U watchwarden" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── API ─────────────────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: watchwarden-api
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://watchwarden:${POSTGRES_PASSWORD}@postgres:5432/watchwarden
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 4000
      SESSION_SECRET: ${SESSION_SECRET}
      API_SECRET: ${API_SECRET}
      ADMIN_USERNAME: ${ADMIN_USERNAME}
      ADMIN_PASSWORD_HASH: ${ADMIN_PASSWORD_HASH}
      TAUTULLI_BASE_URL: ${TAUTULLI_BASE_URL}
      TAUTULLI_API_KEY: ${TAUTULLI_API_KEY}
      JELLYSEERR_BASE_URL: ${JELLYSEERR_BASE_URL}
      JELLYSEERR_API_KEY: ${JELLYSEERR_API_KEY}
      JELLYSEERR_BOT_USER_ID: ${JELLYSEERR_BOT_USER_ID}
      EXPORT_OUTPUT_DIR: /app/exports
      LOG_LEVEL: ${LOG_LEVEL:-info}
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - exports_data:/app/exports
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:4000/health || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ── Worker ──────────────────────────────────────────────────────────────────
  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    container_name: watchwarden-worker
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://watchwarden:${POSTGRES_PASSWORD}@postgres:5432/watchwarden
      NODE_ENV: ${NODE_ENV:-production}
      TAUTULLI_BASE_URL: ${TAUTULLI_BASE_URL}
      TAUTULLI_API_KEY: ${TAUTULLI_API_KEY}
      JELLYSEERR_BASE_URL: ${JELLYSEERR_BASE_URL}
      JELLYSEERR_API_KEY: ${JELLYSEERR_API_KEY}
      JELLYSEERR_BOT_USER_ID: ${JELLYSEERR_BOT_USER_ID}
      TMDB_API_KEY: ${TMDB_API_KEY}
      TRAKT_CLIENT_ID: ${TRAKT_CLIENT_ID}
      EXPORT_OUTPUT_DIR: /app/exports
      LOG_LEVEL: ${LOG_LEVEL:-info}
      TREND_SYNC_CRON: ${TREND_SYNC_CRON:-0 */6 * * *}
      TAUTULLI_SYNC_CRON: ${TAUTULLI_SYNC_CRON:-0 */2 * * *}
      SCORING_CRON: ${SCORING_CRON:-30 */6 * * *}
      JELLYSEERR_STATUS_SYNC_CRON: ${JELLYSEERR_STATUS_SYNC_CRON:-0 * * * *}
      LIBRARY_SYNC_CRON: ${LIBRARY_SYNC_CRON:-0 */3 * * *}
      LIFECYCLE_EVAL_CRON: ${LIFECYCLE_EVAL_CRON:-0 4 * * *}
      EXPORT_CRON: ${EXPORT_CRON:-15 */6 * * *}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - exports_data:/app/exports

  # ── Web ─────────────────────────────────────────────────────────────────────
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: watchwarden-web
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_APP_NAME: "Watch Warden"
      API_URL: http://api:4000
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      ADMIN_USERNAME: ${ADMIN_USERNAME}
      ADMIN_PASSWORD_HASH: ${ADMIN_PASSWORD_HASH}
      SESSION_SECRET: ${SESSION_SECRET}
    ports:
      - "3000:3000"
    depends_on:
      - api
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:3000/api/health || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  postgres_data:
  exports_data:
