[supervisord]
nodaemon=true
logfile=/dev/null
logfile_maxbytes=0
loglevel=info
pidfile=/var/run/supervisord.pid

; ── PostgreSQL ────────────────────────────────────────────────────────────────
; Runs as the postgres OS user. PGBIN is exported by entrypoint.sh.
[program:postgres]
command=%(ENV_PGBIN)s/postgres -D /var/lib/postgresql/data
user=postgres
autostart=true
autorestart=true
priority=10
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

; ── API ───────────────────────────────────────────────────────────────────────
[program:api]
command=node /app/apps/api/dist/index.js
directory=/app/apps/api
autostart=true
autorestart=true
priority=30
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

; ── Worker ────────────────────────────────────────────────────────────────────
[program:worker]
command=node /app/apps/worker/dist/index.js
directory=/app/apps/worker
autostart=true
autorestart=true
priority=30
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

; ── Web (Next.js standalone) ──────────────────────────────────────────────────
; server.js lives at apps/web/server.js inside the standalone output.
[program:web]
command=node /app/apps/web/server.js
directory=/app/apps/web
environment=PORT="3000",HOSTNAME="0.0.0.0"
autostart=true
autorestart=true
priority=30
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
